<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>spaghetti :: awakening</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #000; }
      body {
        font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, Consolas, monospace;
        font-size: 14px;
        line-height: 1.4;
        color: #33ff66;
        overflow: hidden;
      }
      #app { height: 100%; }
      /* CRT-ish glow on text — subtle, not nostalgic-overload. */
      body::after {
        content: '';
        position: fixed; inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
          to bottom,
          rgba(0,0,0,0) 0,
          rgba(0,0,0,0) 2px,
          rgba(0,0,0,0.08) 3px
        );
        mix-blend-mode: multiply;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>

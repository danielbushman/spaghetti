<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>spaghetti :: awakening</title>
    <!--
      Space Mono — designed by Colophon Foundry. Free via Google Fonts.
      A monospaced font with noticeably more personality than JetBrains
      Mono: distinctive g, a, &, slight slab serifs, retro-typewriter
      character. Loaded with both weights (400/700) and both italic
      variants for full flexibility. preconnect hints shave a round-trip
      off the first request.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    >
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #000; }
      body {
        font-family: 'Space Mono', 'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, Consolas, monospace;
        font-size: 14px;
        line-height: 1.4;
        color: #33ff66;
        overflow: hidden;
      }
      #app { height: 100%; }
      /*
        CRT-ish scanlines — subtle, no blend mode. mix-blend-mode: multiply
        forces a full-screen compositing pass that gets expensive as the
        DOM grows (each text span counts toward the composite), and it
        showed up as message-typing slowdown after a few turns. Plain
        opacity on a transparent-banded gradient gives the same effect at
        a fraction of the cost.
      */
      body::after {
        content: '';
        position: fixed; inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
          to bottom,
          rgba(0,0,0,0) 0,
          rgba(0,0,0,0) 2px,
          rgba(0,0,0,0.10) 3px
        );
      }

      /*
        Spark particle base. Each spark is a body-appended div animated by
        the Web Animation API (motion/sparks.ts). Inline styles set per-
        instance size, color, position, and the WAAPI animation owns
        transform + opacity.
      */
      .spark {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        z-index: 100;
        will-change: transform, opacity;
      }
      /*
        Bloom flares for the boot flashes — different particle type from
        sparks. Soft radial-gradient halo, no gravity, blooms outward and
        fades. The background and size are set per-instance by JS at spawn
        (motion/flares.ts).
      */
      .flare {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        z-index: 100;
        will-change: transform, opacity;
      }
      @media (prefers-reduced-motion: reduce) {
        .spark, .flare { display: none; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>spaghetti :: awakening</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #000; }
      body {
        font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, Consolas, monospace;
        font-size: 14px;
        line-height: 1.4;
        color: #33ff66;
        overflow: hidden;
      }
      #app { height: 100%; }
      /*
        CRT-ish scanlines — subtle, no blend mode. mix-blend-mode: multiply
        forces a full-screen compositing pass that gets expensive as the
        DOM grows (each text span counts toward the composite), and it
        showed up as message-typing slowdown after a few turns. Plain
        opacity on a transparent-banded gradient gives the same effect at
        a fraction of the cost.
      */
      body::after {
        content: '';
        position: fixed; inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
          to bottom,
          rgba(0,0,0,0) 0,
          rgba(0,0,0,0) 2px,
          rgba(0,0,0,0.10) 3px
        );
      }

      /*
        Spark particle base. Each spark is a body-appended div animated by
        the Web Animation API (motion/sparks.ts). Inline styles set per-
        instance size, color, position, and the WAAPI animation owns
        transform + opacity.
      */
      .spark {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        z-index: 100;
        will-change: transform, opacity;
      }
      @media (prefers-reduced-motion: reduce) {
        .spark { display: none; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
